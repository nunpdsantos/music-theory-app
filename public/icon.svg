<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fermata app mark — warm cream with walnut fermata symbol.
       Musical notation: the arc (corona) sits above, the dot (punctum)
       marks the held note below. Readable at 32px favicon and 512px app icon. -->

  <!-- Rounded-square background, cream -->
  <rect width="512" height="512" rx="108" fill="#f5efe2"/>

  <!-- Subtle inner border for definition at small sizes -->
  <rect x="6" y="6" width="500" height="500" rx="102" fill="none" stroke="#d8c9a8" stroke-width="4"/>

  <!-- Fermata arc (corona) — centred horizontally, upper third vertically.
       Centre at (256, 300), radius ~140, top semi-circle.
       Substantial stroke weight for visibility at small sizes. -->
  <path d="M 116 300 A 140 140 0 0 1 396 300"
        fill="none"
        stroke="#2a1f14"
        stroke-width="30"
        stroke-linecap="round"/>

  <!-- Fermata dot (punctum) — filled circle below the arc -->
  <circle cx="256" cy="340" r="28" fill="#2a1f14"/>
</svg>
